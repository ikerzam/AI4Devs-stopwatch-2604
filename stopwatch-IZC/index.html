<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d10" />
  <title>Tempo · Cronómetro y Cuenta Atrás</title>
  <style>
    /* ---------- Design tokens ---------- */
    :root {
      --bg: #0b0d10;
      --bg-elev: #14181d;
      --bg-elev-2: #1b2127;
      --border: #262d35;
      --border-strong: #38424d;
      --text: #e8edf2;
      --text-dim: #9aa4b1;
      --text-mute: #6b7682;
      --accent: #b8ff5c;
      --accent-ink: #0b0d10;
      --danger: #ff6b6b;
      --warning: #ffb86b;
      --radius-sm: 10px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
      --shadow-md: 0 8px 24px rgba(0,0,0,.35);
      --shadow-glow: 0 0 0 6px rgba(184, 255, 92, .12);
      --transition: 180ms cubic-bezier(.4,.0,.2,1);
      --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    /* ---------- Reset ---------- */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
    input { font: inherit; color: inherit; }

    body {
      min-height: 100dvh;
      background:
        radial-gradient(1200px 600px at 80% -10%, rgba(184,255,92,.06), transparent 60%),
        radial-gradient(800px 500px at -10% 110%, rgba(120,180,255,.05), transparent 60%),
        var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-feature-settings: "ss01", "cv11";
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
      padding: clamp(16px, 3vw, 32px);
    }

    /* ---------- Layout ---------- */
    .app {
      width: 100%;
      max-width: 880px;
      margin: 0 auto;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: clamp(24px, 5vh, 48px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .brand-mark {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), #7fd33b);
      display: grid; place-items: center;
      box-shadow: var(--shadow-sm);
    }
    .brand-mark::after {
      content: "";
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 2px solid var(--accent-ink);
      border-top-color: transparent;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 14px;
      transition: color var(--transition), background var(--transition), border-color var(--transition);
    }
    .back-btn:hover { color: var(--text); border-color: var(--border-strong); }
    .back-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .back-btn svg { width: 14px; height: 14px; }

    /* ---------- Views ---------- */
    .view { display: none; flex-direction: column; flex: 1; }
    .view.active { display: flex; }

    /* ---------- Home ---------- */
    .home-hero {
      text-align: center;
      margin-bottom: clamp(32px, 6vh, 56px);
    }
    .home-hero h1 {
      font-size: clamp(32px, 5vw, 44px);
      letter-spacing: -0.025em;
      margin: 0 0 12px;
      font-weight: 600;
    }
    .home-hero p {
      color: var(--text-dim);
      margin: 0;
      font-size: clamp(15px, 2vw, 17px);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    @media (max-width: 600px) {
      .cards { grid-template-columns: 1fr; }
    }

    .card {
      position: relative;
      padding: 28px;
      border-radius: var(--radius-lg);
      background: var(--bg-elev);
      border: 1px solid var(--border);
      text-align: left;
      transition: transform var(--transition), border-color var(--transition), background var(--transition);
      overflow: hidden;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 24px;
    }
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(400px 200px at 100% 0%, rgba(184,255,92,.08), transparent 70%);
      opacity: 0;
      transition: opacity var(--transition);
      pointer-events: none;
    }
    .card:hover { transform: translateY(-2px); border-color: var(--border-strong); background: var(--bg-elev-2); }
    .card:hover::after { opacity: 1; }
    .card:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
    .card-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: var(--bg-elev-2);
      border: 1px solid var(--border);
      display: grid; place-items: center;
      color: var(--accent);
    }
    .card:hover .card-icon { background: rgba(184,255,92,.1); border-color: rgba(184,255,92,.3); }
    .card-icon svg { width: 22px; height: 22px; }
    .card-body h2 {
      margin: 0 0 6px;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .card-body p {
      margin: 0;
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ---------- Tool screens ---------- */
    .tool {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(32px, 6vh, 56px);
      padding: clamp(16px, 4vh, 32px) 0;
    }

    .display {
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      font-weight: 500;
      letter-spacing: -0.02em;
      font-size: clamp(56px, 14vw, 120px);
      line-height: 1;
      text-align: center;
      color: var(--text);
      transition: color var(--transition);
      user-select: none;
    }
    .display .ms {
      font-size: 0.45em;
      color: var(--text-mute);
      margin-left: 6px;
      font-weight: 400;
    }
    .display.is-finished {
      color: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 999px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.01em;
      min-height: 30px;
    }
    .status-pill .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-mute);
      transition: background var(--transition), box-shadow var(--transition);
    }
    .status-pill.is-running .dot {
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(184,255,92,.18);
      animation: blink 1.5s ease-in-out infinite;
    }
    .status-pill.is-paused .dot { background: var(--warning); }
    .status-pill.is-finished .dot { background: var(--accent); box-shadow: var(--shadow-glow); }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ---------- Controls ---------- */
    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.005em;
      transition: transform var(--transition), background var(--transition), color var(--transition), border-color var(--transition), box-shadow var(--transition);
      min-height: 48px;
      min-width: 110px;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn svg { width: 16px; height: 16px; }

    .btn-primary {
      background: var(--accent);
      color: var(--accent-ink);
      box-shadow: var(--shadow-md), 0 0 0 0 rgba(184,255,92,0);
    }
    .btn-primary:hover:not(:disabled) {
      background: #c8ff75;
      box-shadow: var(--shadow-md), 0 0 0 6px rgba(184,255,92,.15);
    }

    .btn-secondary {
      background: var(--bg-elev);
      color: var(--text);
      border-color: var(--border);
    }
    .btn-secondary:hover:not(:disabled) {
      background: var(--bg-elev-2);
      border-color: var(--border-strong);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
      border-color: var(--border);
    }
    .btn-ghost:hover:not(:disabled) {
      color: var(--text);
      background: var(--bg-elev);
    }

    /* ---------- Time inputs (countdown) ---------- */
    .time-inputs {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .time-input-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .time-input-group label {
      font-size: 12px;
      color: var(--text-mute);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 500;
    }
    .time-input {
      width: clamp(80px, 18vw, 110px);
      padding: 16px 12px;
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      font-size: clamp(28px, 5vw, 36px);
      font-weight: 500;
      text-align: center;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text);
      transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
      -moz-appearance: textfield;
    }
    .time-input::-webkit-outer-spin-button,
    .time-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .time-input:hover:not(:disabled) { border-color: var(--border-strong); }
    .time-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(184,255,92,.15); background: var(--bg-elev-2); }
    .time-input:disabled { opacity: 0.5; cursor: not-allowed; }
    .time-separator {
      font-family: var(--font-mono);
      font-size: clamp(28px, 5vw, 36px);
      color: var(--text-mute);
      padding-bottom: 18px;
      font-weight: 300;
    }

    .presets {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }
    .preset {
      padding: 8px 16px;
      border-radius: 999px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 500;
      transition: color var(--transition), background var(--transition), border-color var(--transition);
    }
    .preset:hover { color: var(--text); background: var(--bg-elev); border-color: var(--border-strong); }
    .preset:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ---------- Laps ---------- */
    .laps-wrapper {
      width: 100%;
      max-width: 480px;
      max-height: 200px;
      overflow-y: auto;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }
    .laps-wrapper:empty { display: none; }
    .laps-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 4px; }
    .lap-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      transition: background var(--transition);
    }
    .lap-item:hover { background: var(--bg-elev); }
    .lap-num { color: var(--text-mute); font-variant-numeric: tabular-nums; min-width: 30px; }
    .lap-split { color: var(--text-dim); font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 13px; }
    .lap-total { color: var(--text); font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
    .lap-item.is-best .lap-split { color: var(--accent); }
    .lap-item.is-worst .lap-split { color: var(--danger); }

    /* ---------- Scrollbar ---------- */
    .laps-wrapper::-webkit-scrollbar { width: 6px; }
    .laps-wrapper::-webkit-scrollbar-track { background: transparent; }
    .laps-wrapper::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .laps-wrapper::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

    /* ---------- Footer ---------- */
    .footer {
      text-align: center;
      padding-top: 24px;
      color: var(--text-mute);
      font-size: 12px;
    }
    .footer kbd {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      margin: 0 2px;
    }

    /* ---------- Reduced motion ---------- */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ---------- Small screens ---------- */
    @media (max-width: 480px) {
      .btn { padding: 12px 20px; min-width: 90px; font-size: 14px; }
      .controls { gap: 8px; }
      .time-input { padding: 12px 8px; }
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- Topbar -->
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <span>Tempo</span>
      </div>
      <button class="back-btn" id="backBtn" hidden aria-label="Volver al inicio">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        <span>Inicio</span>
      </button>
    </header>

    <!-- Home view -->
    <section class="view active" id="view-home" aria-labelledby="home-title">
      <div class="home-hero">
        <h1 id="home-title">¿Qué necesitas medir?</h1>
        <p>Elige una herramienta para empezar.</p>
      </div>
      <div class="cards">
        <button class="card" data-route="stopwatch" aria-label="Abrir cronómetro">
          <div class="card-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="13" r="8"/>
              <path d="M12 9v4l2 2"/>
              <path d="M9 2h6"/>
              <path d="M19 5l1.5-1.5"/>
            </svg>
          </div>
          <div class="card-body">
            <h2>Cronómetro</h2>
            <p>Mide el tiempo transcurrido con precisión de milisegundos. Incluye vueltas.</p>
          </div>
        </button>

        <button class="card" data-route="timer" aria-label="Abrir cuenta atrás">
          <div class="card-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2v4"/>
              <path d="M12 22a9 9 0 1 0 0-18 9 9 0 0 0 0 18z"/>
              <path d="M12 13l4-4"/>
            </svg>
          </div>
          <div class="card-body">
            <h2>Cuenta atrás</h2>
            <p>Configura un tiempo y recibe un aviso visual cuando llegue a cero.</p>
          </div>
        </button>
      </div>
    </section>

    <!-- Stopwatch view -->
    <section class="view" id="view-stopwatch" aria-labelledby="stopwatch-title">
      <h1 id="stopwatch-title" class="visually-hidden" style="position:absolute;left:-9999px;">Cronómetro</h1>
      <div class="tool">
        <div class="status-pill" id="sw-status" role="status" aria-live="polite">
          <span class="dot" aria-hidden="true"></span>
          <span class="label">Listo</span>
        </div>

        <div class="display" id="sw-display" aria-label="Tiempo transcurrido">
          00:00:00<span class="ms">.000</span>
        </div>

        <div class="controls">
          <button class="btn btn-primary" id="sw-start">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
            <span>Iniciar</span>
          </button>
          <button class="btn btn-secondary" id="sw-lap" disabled>Vuelta</button>
          <button class="btn btn-ghost" id="sw-reset" disabled>Reiniciar</button>
        </div>

        <div class="laps-wrapper" id="sw-laps-wrapper">
          <ul class="laps-list" id="sw-laps"></ul>
        </div>
      </div>
    </section>

    <!-- Timer view -->
    <section class="view" id="view-timer" aria-labelledby="timer-title">
      <h1 id="timer-title" class="visually-hidden" style="position:absolute;left:-9999px;">Cuenta atrás</h1>
      <div class="tool">
        <div class="status-pill" id="tm-status" role="status" aria-live="polite">
          <span class="dot" aria-hidden="true"></span>
          <span class="label">Configura el tiempo</span>
        </div>

        <div id="tm-display-wrapper">
          <div class="display" id="tm-display" hidden aria-label="Tiempo restante">00:00:00</div>
          <div class="time-inputs" id="tm-inputs">
            <div class="time-input-group">
              <label for="tm-h">Horas</label>
              <input class="time-input" id="tm-h" type="number" min="0" max="99" value="0" inputmode="numeric" />
            </div>
            <span class="time-separator" aria-hidden="true">:</span>
            <div class="time-input-group">
              <label for="tm-m">Minutos</label>
              <input class="time-input" id="tm-m" type="number" min="0" max="59" value="5" inputmode="numeric" />
            </div>
            <span class="time-separator" aria-hidden="true">:</span>
            <div class="time-input-group">
              <label for="tm-s">Segundos</label>
              <input class="time-input" id="tm-s" type="number" min="0" max="59" value="0" inputmode="numeric" />
            </div>
          </div>
        </div>

        <div class="presets" id="tm-presets" aria-label="Tiempos predefinidos">
          <button class="preset" data-seconds="60">1 min</button>
          <button class="preset" data-seconds="180">3 min</button>
          <button class="preset" data-seconds="300">5 min</button>
          <button class="preset" data-seconds="600">10 min</button>
          <button class="preset" data-seconds="1500">25 min</button>
        </div>

        <div class="controls">
          <button class="btn btn-primary" id="tm-start">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
            <span>Iniciar</span>
          </button>
          <button class="btn btn-ghost" id="tm-reset" disabled>Limpiar</button>
        </div>
      </div>
    </section>

    <footer class="footer">
      <span>Atajos: <kbd>Espacio</kbd> iniciar/pausar · <kbd>R</kbd> reiniciar · <kbd>Esc</kbd> volver</span>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
